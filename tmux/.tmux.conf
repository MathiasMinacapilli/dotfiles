# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Compatibility
set -g default-terminal screen-256color

# Allow scroll
set -g mouse on

# Copy to clipboard
set -s set-clipboard external
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key [ copy-mode 

# Default shell
set-option -g default-shell /bin/zsh

set-option -g base-index 1                # window index will start with 1
set-window-option -g pane-base-index 1    # pane index will start with 1
set-option -g renumber-windows on 

unbind-key x               # unbind-key “x” from it’s current job of “ask and then close”
bind-key x kill-pane       # rebind-key it to just “close”
bind-key X kill-session    # key combo for killing the entire session - <prefix> + shift + x

######################
### DESIGN CHANGES ###
######################

# Barra de estado minimalista y transparente (bg=default)
set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=colour245,bg=default"

# Lado Izquierdo: Nombre de la sesión
set -g status-left-length 40
set -g status-left "#[fg=colour250,bold] #S #[fg=colour238]│ "

# Lado Derecho: Hora y Host (Compatible con Linux/macOS)
set -g status-right-length 60
set -g status-right "#[fg=colour238]│ #[fg=colour245]%H:%M #[fg=colour238]• #[fg=colour250]#H "

# Ventanas inactivas
setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=colour245"

# Ventana activa (resaltada en color cian suave)
setw -g window-status-current-format " #[bold]#I:#W "
setw -g window-status-current-style "fg=colour117"

# Bordes de los paneles
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour117"

# Estilo de mensajes/comandos
set -g message-style "fg=colour232,bg=colour117,bold"

# Desactivar notificaciones visuales molestas
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Copy to clipboard
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"

